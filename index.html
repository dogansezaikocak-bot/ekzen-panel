<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekzen Teknik - Yönetim Paneli</title>
    <style>
        :root { --main-blue: #0066b2; --bg-gray: #f4f6f9; --border-color: #d1d5db; }
        body { background-color: var(--bg-gray); display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        .sidebar { width: 70px; background: #fff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; }
        .nav-item { width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #555; }
        .nav-item.active { background-color: #e3f2fd; color: var(--main-blue); }
        .main-wrapper { flex: 1; padding: 20px; overflow-y: auto; }
        .filter-section { background: white; padding: 15px; margin-bottom: 20px; border-radius: 6px; border: 1px solid var(--border-color); display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--main-blue); color: white; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; }
        .modal-box { width:600px; background:white; padding:20px; border-radius:8px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="nav-item active">📋</div>
</div>

<div class="main-wrapper">
    <div class="filter-section">
        <button class="btn btn-blue" onclick="openNewServisModal()">➕ Yeni Servis</button>
        <input type="text" id="searchKeyword" onkeyup="renderServisler()" placeholder="Müşteri ara...">
        <select id="filterKanal" onchange="renderServisler()">
            <option value="">Tüm Kaynaklar</option>
            <option value="Saha">Saha</option>
            <option value="Google">Google</option>
            <option value="Instagram">Instagram</option>
        </select>
    </div>
    <table>
        <thead><tr><th>Tarih</th><th>No</th><th>Müşteri</th><th>Kaynak</th><th>İşlem</th></tr></thead>
        <tbody id="servisTableBody"></tbody>
    </table>
</div>

<div class="modal-overlay" id="servisModal">
    <div class="modal-box">
        <h3>Servis Detay</h3>
        <p>Müşteri: <span id="mName"></span></p>
        <button class="btn btn-blue" onclick="window.print()">📄 PDF/Yazdır</button>
        <button class="btn" onclick="document.getElementById('servisModal').style.display='none'">Kapat</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ekzen_db')) || { servisler: [] };
    
    function renderServisler() {
        let q = document.getElementById('searchKeyword').value.toLowerCase();
        let k = document.getElementById('filterKanal').value.toLowerCase();
        let tbody = document.getElementById('servisTableBody');
        tbody.innerHTML = '';
        
        db.servisler.filter(s => s.name.toLowerCase().includes(q) && (k=="" || s.kanal.toLowerCase()==k))
        .sort((a,b) => new Date(b.tarih) - new Date(a.tarih))
        .forEach((s, i) => {
            tbody.innerHTML += `<tr><td>${s.tarih}</td><td>#${s.id}</td><td>${s.name}</td><td>${s.kanal}</td>
            <td><button class="btn btn-blue" onclick="openDetail(${i})">Detay</button></td></tr>`;
        });
    }

    function openNewServisModal() {
        let name = prompt("Müşteri Adı:");
        let kanal = prompt("Kaynak (Saha, Google, Instagram):", "Saha");
        let tarih = prompt("Tarih (GG.AA.YYYY):", new Date().toLocaleDateString('tr-TR'));
        if(name) {
            db.servisler.push({ id: Date.now().toString().slice(-4), name, kanal, tarih });
            localStorage.setItem('ekzen_db', JSON.stringify(db));
            renderServisler();
        }
    }

    function openDetail(i) {
        document.getElementById('mName').innerText = db.servisler[i].name;
        document.getElementById('servisModal').style.display = 'flex';
    }

    renderServisler();
</script>
</body>
</html>
