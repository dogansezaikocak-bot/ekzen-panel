<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekzen Teknik - Gelişmiş Servis Yönetim Paneli</title>
    <style>
        :root { --main-blue: #0066b2; --bg-gray: #f4f6f9; --border-color: #d1d5db; --text-color: #333; --success-green: #2e7d32; --danger-red: #c62828; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-gray); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 70px; background: #fff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; }
        .nav-item { width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #555; transition: 0.2s; }
        .nav-item.active { background-color: #e3f2fd; color: var(--main-blue); }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .navbar { height: 60px; background-color: var(--main-blue); color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .content-area { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .content-area.active { display: block; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--main-blue); color: white; }
        .table-container { background: white; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8f9fa; padding: 12px; border-bottom: 2px solid var(--border-color); }
        td { padding: 12px; border-bottom: 1px solid var(--border-color); }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:999; }
        .modal-box { width:90%; max-width:800px; background:white; padding:20px; border-radius:8px; max-height:90vh; overflow-y:auto; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="nav-item active" onclick="switchTab('dashboard', this)">🏠</div>
    <div class="nav-item" onclick="switchTab('servisler', this)">📋</div>
    <div class="nav-item" onclick="switchTab('kasa', this)">₺</div>
</div>

<div class="main-wrapper">
    <div class="navbar"><div>Ekzen Teknik Yönetim</div></div>
    <div id="dashboard" class="content-area active"><h2>Dashboard</h2></div>
    <div id="servisler" class="content-area">
        <button class="btn btn-blue" onclick="openNewServisModal()">➕ Yeni Servis Ekle</button>
        <div class="table-container" style="margin-top:20px;"><table id="servisTable"><thead><tr><th>No</th><th>Müşteri</th><th>Cihaz</th><th>Durum</th><th>İşlem</th></tr></thead><tbody id="servisTableBody"></tbody></table></div>
    </div>
    <div id="kasa" class="content-area"><h2>Kasa</h2></div>
</div>

<div class="modal-overlay" id="servisModal">
    <div class="modal-box">
        <h3>Servis Detay</h3>
        <button class="btn btn-blue" onclick="generateServisFisi()">📄 PDF Servis Fişi Oluştur</button>
        <button class="btn" onclick="closeModal()">Kapat</button>
    </div>
</div>

<div id="pdfPrintArea" style="display:none; padding: 40px; font-family: sans-serif; color: #000; max-width: 800px; margin: auto;">
    <div style="text-align:center; margin-bottom: 20px; border-bottom: 2px solid #000;">
        <h1 style="margin:0;">EKZEN TEKNİK</h1>
        <p style="margin:0;">Beyaz Eşya & Kombi Servis Hizmetleri</p>
    </div>
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <div><strong>Müşteri:</strong> <span id="pName"></span><br><strong>Telefon:</strong> <span id="pPhone"></span></div>
        <div><strong>Fiş No:</strong> #<span id="pId"></span><br><strong>Tarih:</strong> <span id="pDate"></span></div>
    </div>
    <div style="border:1px solid #000; padding:10px; margin-bottom:20px;">
        <strong>Cihaz:</strong> <span id="pCihaz"></span> | <strong>Arıza:</strong> <span id="pAriza"></span>
    </div>
    <div style="margin-top:20px; text-align:right; font-size:18px;"><strong>TOPLAM TUTAR:</strong> <span id="pToplam"></span> TL</div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ekzen_db')) || { servisler: [], kasa: [] };
    let activeServisIndex = -1;

    function saveToStorage() { localStorage.setItem('ekzen_db', JSON.stringify(db)); }

    function switchTab(tabId, el) {
        document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    }

    function renderServisler() {
        const tbody = document.getElementById('servisTableBody');
        tbody.innerHTML = db.servisler.map((s, i) => `<tr><td>#${s.id}</td><td>${s.name}</td><td>${s.cihaz}</td><td>${s.status}</td><td><button class="btn btn-blue" onclick="openDetailModal(${i})">Detay</button></td></tr>`).join('');
    }

    function openDetailModal(idx) {
        activeServisIndex = idx;
        document.getElementById('servisModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('servisModal').style.display = 'none'; }

    function generateServisFisi() {
        if(activeServisIndex === -1) return;
        const s = db.servisler[activeServisIndex];
        
        document.getElementById('pName').innerText = s.name;
        document.getElementById('pPhone').innerText = s.phone || "Belirtilmemiş";
        document.getElementById('pId').innerText = s.id;
        document.getElementById('pDate').innerText = s.date;
        document.getElementById('pCihaz').innerText = s.cihaz + " / " + s.model;
        document.getElementById('pAriza').innerText = s.ariza;
        
        let toplam = s.odemeler ? s.odemeler.reduce((sum, item) => sum + parseInt(item.tutar || 0), 0) : 0;
        document.getElementById('pToplam').innerText = toplam;

        const originalContent = document.body.innerHTML;
        document.body.innerHTML = document.getElementById('pdfPrintArea').innerHTML;
        window.print();
        document.body.innerHTML = originalContent;
        location.reload();
    }

    function openNewServisModal() {
        let name = prompt("Müşteri Adı:");
        if(!name) return;
        db.servisler.push({ id: Date.now().toString().slice(-4), name: name, phone: "0500...", cihaz: "Kombi", model: "Nitron", status: "Açık", date: new Date().toLocaleDateString(), ariza: "F05 Arızası", odemeler: [{tutar: 4000}] });
        saveToStorage();
        renderServisler();
    }

    renderServisler();
</script>
</body>
</html>
